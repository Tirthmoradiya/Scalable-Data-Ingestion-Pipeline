name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff==0.4.0
      - run: ruff --version
      - run: ruff check pipeline/ tests/ cli.py
      - run: ruff format --check pipeline/ tests/ cli.py

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install mypy pydantic pydantic-settings sqlalchemy types-requests
      - run: mypy pipeline/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools>=68.0.0" wheel
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=pipeline \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t data-pipeline:ci .
      - name: Smoke test container
        run: |
          docker run --rm --entrypoint python data-pipeline:ci -c "from pipeline.settings import settings; print('Settings OK')"
